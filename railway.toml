# Railway deployment configuration for ChatMerge
# https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
# Dockerfile handles: Node 20 install, npm build, uv sync

[deploy]
# CMD in Dockerfile starts uvicorn; $PORT injected by Railway
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
